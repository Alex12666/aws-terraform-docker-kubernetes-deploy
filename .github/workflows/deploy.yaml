name: projeto terraform kubenet aws docker github action

on:
  push:
    branches:
      - main  

jobs:
  projeto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      # 1. Autentica o Runner do GitHub na AWS
      - name: Configurar Credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # 2. Faz o login no ECR para o Runner
      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build e Push das imagens (Amarrados no mesmo bloco)
      - name: Rodando Docker - Backend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/imagem_docker:backend-latest -f ./web/backend/Dockerfile ./web/backend
          docker push ${{ steps.login-ecr.outputs.registry }}/imagem_docker:backend-latest

      - name: Rodando Docker - Frontend
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/imagem_docker:frontend-latest -f ./web/Frontend/Dockerfile ./web/Frontend
          docker push ${{ steps.login-ecr.outputs.registry }}/imagem_docker:frontend-latest

      # 4. Conecta na EC2 passando as credenciais para o Login do ECR funcionar lá dentro
      - name: Executar Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        with:
          host: ${{ secrets.AWS_INSTANCE_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ECR_REGISTRY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION
          script: |
            # Instala o docker e awscli na instância nova se não tiver instalado
            if ! command -v docker &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y docker.io awscli
              sudo usermod -aG docker ubuntu
            fi
            
            # Autentica a máquina no ECR usando as chaves injetadas pelo pipeline
            aws ecr get-login-password --region us-east-2 | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
            
            # Limpa containers antigos
            sudo docker rm -f rpg-frontend rpg-backend 2>/dev/null || true
            
            # Puxa as imagens atualizadas do ECR
            sudo docker pull $ECR_REGISTRY/imagem_docker:backend-latest
            sudo docker pull $ECR_REGISTRY/imagem_docker:frontend-latest
            
            # Inicializa os containers de forma isolada na máquina nova
            sudo docker run -d --name rpg-backend -p 5000:5000 $ECR_REGISTRY/imagem_docker:backend-latest
            sudo docker run -d --name rpg-frontend -p 80:80 $ECR_REGISTRY/imagem_docker:frontend-latest